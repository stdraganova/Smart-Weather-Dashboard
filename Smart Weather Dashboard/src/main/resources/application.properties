spring.application.name=Smart Weather Dashboard

# Server Configuration
server.port=8080

# OpenWeatherMap API Configuration
weather.api.key=af5c98b7105f6f987357994e14d782d3
weather.api.base-url=https://api.openweathermap.org/data/2.5
weather.api.timeout=5000
weather.default.unit=metric

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:weatherdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.root=INFO
logging.level.com.example.smartweatherdashboard=DEBUG

